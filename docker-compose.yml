services:
  db:
    image: postgres:16-alpine
    container_name: numerical-method-db
    environment:
      POSTGRES_DB: numerical_method
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d numerical_method"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: numerical-method-api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/numerical_method?schema=public
      PORT: 4000
      CLIENT_URL: http://localhost:8080
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"
    command: sh -c "npx prisma migrate deploy --schema /app/prisma/schema.prisma && node dist/index.js"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: numerical-method-web
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  postgres_data:
